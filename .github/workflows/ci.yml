# PKC2 CI — Tier 1-1 (v0.1.0 release gate)
#
# 目的: main / 開発ブランチに push / PR があったとき、
#   1. typecheck (tsc --noEmit) が通る
#   2. 全テスト (npm test / vitest run) が通る
#   3. bundle ビルド (vite build) が通る
# の 3 点を自動で検証する。
#
# lint は Tier 3-3（2026-04-14）で blocking に昇格済み。以前は
# ESLint 設定が CLAUDE.md §Architecture（adapter orchestrates
# features）と逆になっていて 91 件程度の pre-existing な
# no-restricted-imports エラーが溜まっていたが、Tier 3-3 で
# .eslintrc.cjs を正本化してゼロ化した。経緯は
# docs/development/lint-baseline-realignment.md を参照。
#
# 対象ブランチ: main / PR to main。
# 対象 OS: ubuntu-latest 単一 (配布物が単一 HTML のため OS 差分不要)。
# Node: 20.x (package.json devDependencies の @types/node@25 を
# サポートする LTS)。
#
# Trigger scope (2026-04-25 update): 旧版は `claude/**` への push でも
# CI を走らせていたが、PR を開くと `push: claude/**` と
# `pull_request: → main` の双方が走り **同じ workflow が 2 回実行** され
# 計算資源を倍消費していた(GitHub Actions 上限を圧迫)。dev branch への
# push だけで PR を開かない WIP commit に CI を走らせる需要は実運用上
# 低い(PR を開いた時点で必ず CI が走る + ローカルで `npm run typecheck`
# / `lint` / `test` / `test:smoke` を pre-PR で実行するルールが
# `docs/development/pr-review-checklist.md` §3 に確立済み)ため、push
# トリガーは `main` のみに絞る。dev branch の検査は PR open / sync で
# `pull_request: → main` トリガーが 1 回走り、merge 後の main で push
# トリガーが 1 回走る、計 2 回まで圧縮される。

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 同じブランチの新しい push が来たら古い run をキャンセルする。
# PR 連投時の CI コスト削減。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Tier 3-3 で blocking 化（2026-04-14）。継続的品質ゲートと
        # して機能する。理由は docs/development/lint-baseline-realignment.md。
        run: npm run lint

      - name: Doc orphans + dead-links
        # Phase 5 (reform-2026-05): docs/development/INDEX.md を canonical
        # truth source として、(1) docs/development 配下の md ファイルが
        # INDEX に登録されているか(orphan check)、(2) docs 配下の md
        # 内 relative link が壊れていないか(dead-link check)を blocking で
        # 検証する。Phase 1-3 cleanup wave で達成した orphan 0 / 整合
        # された cross-ref を継続的に維持するため。
        run: npm run check:docs

      - name: Test (with coverage gate)
        # Bump V8 heap to 4GB. Node 20 default (~2GB) was insufficient
        # for the cumulative test surface (4228 tests / 165 files):
        # the threads pool shares one V8 isolate per worker and the
        # accumulated happy-dom DOM across files trips OOM mid-run on
        # the GitHub-hosted ubuntu runner. Raising the limit is the
        # least-invasive fix; vitest pool tuning would change behavior.
        #
        # Coverage gate (2026-05-03 / reform-2026-05): the repo-wide
        # minimum thresholds in vitest.config.ts (80 stmt / 78 br /
        # 85 fn / 80 ln) block PRs that drop more than ~5 pp from
        # the 2026-05-03 baseline (84.95% statements). v8 provider
        # is Node-builtin so the only added cost is the @vitest/
        # coverage-v8 instrumentation harness (~+30-60 sec).
        # Adoption rationale: docs/development/test-strategy-audit-2026-05.md §1.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test:coverage

      - name: Build bundle
        run: npm run build:bundle

      - name: Bundle size budget
        # Tier 3-2 (2026-04-14): hard fail when dist/bundle.js or
        # dist/bundle.css exceed a fixed raw-size budget. Budgets are
        # chosen from the Tier 3-1 baseline (bundle.js 502.81 KB,
        # bundle.css 72.31 KB) + ~20% headroom so natural feature
        # churn doesn't immediately red-line CI, but a sudden jump
        # (e.g. a heavy dep pulled into the wrong layer) surfaces
        # immediately. Raw size rather than gzip because gzip ratio
        # varies with content and we want a stable "I added code"
        # signal. Rationale lives in
        # docs/development/release-automation-and-smoke-baseline.md.
        run: node build/check-bundle-size.cjs

      - name: Build release HTML
        # Manual builder depends on dist/pkc2.html (produced here),
        # so we run build:release before build:manual. Matches the
        # order used by release.yml for consistency.
        run: npm run build:release

      - name: Build manual HTML
        # Phase 2 of manual-build integration (PR #48 was Phase 1,
        # which fixed the $& replacement bug in manual-builder). Running
        # build:manual on every PR/main push ensures the class of
        # failure that hid until v* tag release can no longer regress
        # silently. See docs/development/manual-build-integration-plan.md.
        run: npm run build:manual

      - name: Manual integrity check
        # Asserts `PKC2-Extensions/pkc2-manual.html` contains exactly
        # one parseable `<script id="pkc-data">` payload with a valid
        # container shape. Locks out the specific regression the
        # Phase 1 fix addressed, plus any similarly structured future
        # breakage.
        run: npm run check:manual
