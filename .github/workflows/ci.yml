# PKC2 CI — Tier 1-1 (v0.1.0 release gate)
#
# 目的: main / 開発ブランチに push / PR があったとき、
#   1. typecheck (tsc --noEmit) が通る
#   2. 全テスト (npm test / vitest run) が通る
#   3. bundle ビルド (vite build) が通る
# の 3 点を自動で検証する。
#
# lint は Tier 3-3（2026-04-14）で blocking に昇格済み。以前は
# ESLint 設定が CLAUDE.md §Architecture（adapter orchestrates
# features）と逆になっていて 91 件程度の pre-existing な
# no-restricted-imports エラーが溜まっていたが、Tier 3-3 で
# .eslintrc.cjs を正本化してゼロ化した。経緯は
# docs/development/lint-baseline-realignment.md を参照。
#
# 対象ブランチ: main / claude/** / PR to main。
# 対象 OS: ubuntu-latest 単一 (配布物が単一 HTML のため OS 差分不要)。
# Node: 20.x (package.json devDependencies の @types/node@25 を
# サポートする LTS)。

name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# 同じブランチの新しい push が来たら古い run をキャンセルする。
# PR 連投時の CI コスト削減。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # Tier 3-3 で blocking 化（2026-04-14）。継続的品質ゲートと
        # して機能する。理由は docs/development/lint-baseline-realignment.md。
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run build:bundle

      - name: Bundle size budget
        # Tier 3-2 (2026-04-14): hard fail when dist/bundle.js or
        # dist/bundle.css exceed a fixed raw-size budget. Budgets are
        # chosen from the Tier 3-1 baseline (bundle.js 502.81 KB,
        # bundle.css 72.31 KB) + ~20% headroom so natural feature
        # churn doesn't immediately red-line CI, but a sudden jump
        # (e.g. a heavy dep pulled into the wrong layer) surfaces
        # immediately. Raw size rather than gzip because gzip ratio
        # varies with content and we want a stable "I added code"
        # signal. Rationale lives in
        # docs/development/release-automation-and-smoke-baseline.md.
        run: node build/check-bundle-size.cjs
