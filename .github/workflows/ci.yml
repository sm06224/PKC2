# PKC2 CI — Tier 1-1 (v0.1.0 release gate)
#
# 目的: main / 開発ブランチに push / PR があったとき、
#   1. typecheck (tsc --noEmit) が通る
#   2. 全テスト (npm test / vitest run) が通る
#   3. bundle ビルド (vite build) が通る
# の 3 点を自動で検証する。
#
# lint は `continue-on-error: true` で情報扱い — 現状 ESLint 設定が
# アーキテクチャ規約 (CLAUDE.md: adapter orchestrates features) と
# ずれており 80 件程度の pre-existing な no-restricted-imports エラー
# が溜まっている。lint config 自体の整理は別 PR の仕事で、CI 導入の
# スコープには含めない。
#
# 対象ブランチ: main / claude/** / PR to main。
# 対象 OS: ubuntu-latest 単一 (配布物が単一 HTML のため OS 差分不要)。
# Node: 20.x (package.json devDependencies の @types/node@25 を
# サポートする LTS)。

name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# 同じブランチの新しい push が来たら古い run をキャンセルする。
# PR 連投時の CI コスト削減。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (non-blocking)
        # pre-existing な ESLint config drift が解消されるまで非ブロッ
        # キング扱い。ログは残して回帰はレビューで拾う。
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run build:bundle
