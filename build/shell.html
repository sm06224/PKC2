<!DOCTYPE html>
<html lang="ja"
      data-pkc-app="{{APP}}"
      data-pkc-version="{{VERSION}}"
      data-pkc-schema="{{SCHEMA}}"
      data-pkc-timestamp="{{TIMESTAMP}}"
      data-pkc-kind="{{KIND}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>PKC2</title>
  <style id="pkc-styles">{{STYLES}}</style>
  <style id="pkc-theme">/* theme overrides */</style>
</head>
<body>
  <div id="pkc-root"></div>

  <script id="pkc-data" type="application/json">{{PKC_DATA}}</script>

  <script id="pkc-meta" type="application/json">{{META}}</script>

  <script id="pkc-core">{{CORE}}</script>
</body>
</html>
